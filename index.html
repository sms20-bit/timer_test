<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육용 뽀모도로 타이머</title>
//////////////////////////////
    <!-- 외부 라이브러리 (Tailwind CSS, Lucide Icons) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- [1. CSS PART] - 디자인 및 애니메이션 설정 -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap');
        
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        /* 디지털 시계 폰트 */
        .digital-font {
            font-family: 'JetBrains Mono', monospace;
        }

        /* 시각적 타이머: 이미지와 동일하게 시계 방향으로 줄어들도록 반전 처리 */
        #visual-timer {
            transition: background 0.3s ease;
            transform: scaleX(-1); 
        }

        /* 타이머 내부 숫자는 다시 정방향으로 반전 */
        .timer-number {
            transform: scaleX(-1);
        }

        /* 숫자 입력창의 화살표 제거 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* 버튼 호버 및 활성화 애니메이션 */
        .btn-interact {
            transition: all 0.2s ease;
        }
        .btn-interact:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <!-- [2. HTML PART] - 앱의 구조 및 레이아웃 -->
    <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md border border-slate-100">
        
        <!-- 상단 헤더 및 시간 설정 섹션 -->
        <header class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-700 mb-6">시각적 뽀모도로 타이머</h1>
            
            <!-- 시간 입력 폼 -->
            <div class="flex items-center justify-center gap-2 mb-6 bg-slate-50 p-4 rounded-2xl border border-slate-200">
                <div class="flex flex-col items-center">
                    <span class="text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-tighter">MINUTES</span>
                    <input type="number" id="input-min" value="25" min="0" max="60" 
                        class="w-14 text-2xl digital-font text-center bg-transparent border-b-2 border-slate-300 focus:border-red-400 outline-none">
                </div>
                <span class="text-2xl digital-font pt-4 text-slate-400">:</span>
                <div class="flex flex-col items-center">
                    <span class="text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-tighter">SECONDS</span>
                    <input type="number" id="input-sec" value="0" min="0" max="59" 
                        class="w-14 text-2xl digital-font text-center bg-transparent border-b-2 border-slate-300 focus:border-red-400 outline-none">
                </div>
                <button id="set-time-btn" class="ml-4 p-3 bg-slate-800 text-white rounded-xl hover:bg-slate-700 btn-interact">
                    <i data-lucide="settings-2" class="w-5 h-5"></i>
                </button>
            </div>
            
            <!-- 현재 남은 시간 (디지털) -->
            <div id="digital-display" class="text-6xl digital-font font-bold text-slate-800 tracking-tight mb-2">
                25:00
            </div>
        </header>

        <!-- 중앙 비주얼 타이머 섹션 -->
        <main class="relative flex items-center justify-center mb-10">
            <div class="relative w-72 h-72 rounded-full border-[12px] border-slate-800 flex items-center justify-center bg-white shadow-xl overflow-hidden">
                <!-- 빨간색 게이지 영역 (JS에서 background 업데이트) -->
                <div id="visual-timer" class="absolute inset-0 w-full h-full"></div>

                <!-- 시계 눈금 및 숫자 레이어 (JS에서 동적 생성) -->
                <div id="clock-face" class="absolute inset-0 pointer-events-none"></div>

                <!-- 중앙 디자인 핀 -->
                <div class="z-10 w-8 h-8 bg-slate-800 rounded-full border-4 border-slate-700 shadow-md flex items-center justify-center">
                    <div class="w-1.5 h-1.5 bg-slate-400 rounded-full"></div>
                </div>
            </div>
        </main>

        <!-- 하단 컨트롤 버튼 섹션 -->
        <footer class="flex justify-center items-center gap-6">
            <button id="reset-btn" class="p-4 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200 btn-interact">
                <i data-lucide="rotate-ccw" class="w-6 h-6"></i>
            </button>
            
            <button id="toggle-btn" class="w-20 h-20 rounded-full flex items-center justify-center bg-red-500 text-white hover:bg-red-600 shadow-lg shadow-red-200 btn-interact">
                <i id="toggle-icon" data-lucide="play" class="w-10 h-10 fill-current ml-1"></i>
            </button>

            <button id="test-sound-btn" class="p-4 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200 btn-interact">
                <i data-lucide="bell" class="w-6 h-6"></i>
            </button>
        </footer>

        <!-- 상태 메시지 알림 -->
        <p id="status-msg" class="mt-8 text-center text-slate-400 text-sm font-medium">
            공부 시간을 설정하고 시작하세요.
        </p>
    </div>

    <!-- [3. JAVASCRIPT PART] - 타이머 로직 및 인터랙션 -->
    <script>
        /** [A] 데이터 상태 및 엘리먼트 참조 **/
        let timeLeft = 1500; 
        let initialTime = 1500;
        let timerInterval = null;
        let isActive = false;

        const digitalDisplay = document.getElementById('digital-display');
        const visualTimer = document.getElementById('visual-timer');
        const clockFace = document.getElementById('clock-face');
        const toggleBtn = document.getElementById('toggle-btn');
        const toggleIcon = document.getElementById('toggle-icon');
        const resetBtn = document.getElementById('reset-btn');
        const setTimeBtn = document.getElementById('set-time-btn');
        const testSoundBtn = document.getElementById('test-sound-btn');
        const statusMsg = document.getElementById('status-msg');

        /** [B] UI 초기화: 시계 눈금 생성 **/
        function createClockFace() {
            for (let i = 0; i < 60; i++) {
                const angle = i * 6;
                const tick = document.createElement('div');
                tick.className = 'absolute w-full h-full flex justify-center pt-1';
                tick.style.transform = `rotate(${angle}deg)`;
                
                if (i % 5 === 0) {
                    // 숫자와 긴 눈금
                    const numContainer = document.createElement('div');
                    numContainer.className = 'flex flex-col items-center';
                    
                    const num = document.createElement('span');
                    num.className = 'timer-number text-xs font-black text-slate-600';
                    num.style.transform = `rotate(${-angle}deg)`;
                    num.innerText = i;
                    
                    const marker = document.createElement('div');
                    marker.className = 'w-0.5 h-2.5 bg-slate-400 mt-1';
                    
                    numContainer.appendChild(num);
                    numContainer.appendChild(marker);
                    tick.appendChild(numContainer);
                } else {
                    // 짧은 눈금
                    const smallTick = document.createElement('div');
                    smallTick.className = 'w-[1px] h-1 bg-slate-300';
                    tick.appendChild(smallTick);
                }
                clockFace.appendChild(tick);
            }
        }

        /** [C] 화면 업데이트 로직 **/
        function updateDisplay() {
            // 1. 디지털 텍스트 업데이트
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            digitalDisplay.innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;

            // 2. 비주얼 게이지 업데이트 (60분=3600초 기준)
            const rotation = (timeLeft / 3600) * 360;
            visualTimer.style.background = `conic-gradient(#ef4444 ${rotation}deg, #f1f5f9 0deg)`;
        }

        /** [D] 타이머 핵심 제어 함수 **/
        function toggleTimer() {
            if (isActive) {
                // 중지 모드
                clearInterval(timerInterval);
                isActive = false;
                updateControlUI('play', 'bg-red-500', 'text-white', "일시 정지됨");
            } else {
                // 시작 모드
                if (timeLeft <= 0) return;
                isActive = true;
                updateControlUI('pause', 'bg-amber-100', 'text-amber-600', "집중하는 시간입니다!");
                
                timerInterval = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        isActive = false;
                        playAlarm();
                        updateControlUI('play', 'bg-red-500', 'text-white', "시간이 다 되었습니다!");
                    }
                }, 1000);
            }
        }

        function updateControlUI(icon, bgClass, textClass, msg) {
            toggleIcon.setAttribute('data-lucide', icon);
            // 기존 색상 클래스 교체
            toggleBtn.className = `w-20 h-20 rounded-full flex items-center justify-center shadow-lg shadow-red-200 transition-all active:scale-95 ${bgClass} ${textClass}`;
            statusMsg.innerText = msg;
            lucide.createIcons();
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isActive = false;
            timeLeft = initialTime;
            updateDisplay();
            updateControlUI('play', 'bg-red-500', 'text-white', "공부 시간을 설정하고 시작하세요.");
        }

        function setCustomTime() {
            const min = parseInt(document.getElementById('input-min').value) || 0;
            const sec = parseInt(document.getElementById('input-sec').value) || 0;
            const total = (min * 60) + sec;
            
            if (total > 0 && total <= 3600) {
                initialTime = total;
                timeLeft = total;
                resetTimer();
            } else {
                alert("1초에서 60분 사이의 시간을 설정해주세요.");
            }
        }

        /** [E] 사운드 및 알림 **/
        function playAlarm() {
            try {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = context.createOscillator();
                const gain = context.createGain();
                oscillator.connect(gain);
                gain.connect(context.destination);
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(440, context.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, context.currentTime + 1.5);
                oscillator.start();
                oscillator.stop(context.currentTime + 1.5);
            } catch (e) { console.log("Audio play failed"); }
        }

        /** [F] 이벤트 바인딩 **/
        toggleBtn.addEventListener('click', toggleTimer);
        resetBtn.addEventListener('click', resetTimer);
        setTimeBtn.addEventListener('click', setCustomTime);
        testSoundBtn.addEventListener('click', playAlarm);

        // 페이지 로드 시 초기화 실행
        window.onload = () => {
            createClockFace();
            updateDisplay();
            lucide.createIcons();
        };
    </script>
</body>
</html>
